name: Build Clicker Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.14
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        cache: 'pip' # caching pip dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    - name: Build (release)
      run: |
        pyinstaller -F main.py --noconsole --name BongoCatClicker --icon cat.ico --collect-all customtkinter
    - name: Copy File
      run: |
        mkdir -p bundle
        cp dist/BongoCatClicker.exe bundle/
    - name: Upload bundle
      uses: actions/upload-artifact@v4
      with:
        name: windows-bundle
        path: bundle
    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "bundle/*"
